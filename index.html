<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>BeausHorrorGame</title>

    <style>
        body {
            margin: 0;
            background: #000;
        }

        #unity-container {
            width: 100vw;
            height: 100vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
    </div>

    <script>
        const canvas = document.querySelector("#unity-canvas");

        const buildBase = "https://cdn.jsdelivr.net/gh/BeauTheBean/BeausBackRooms@latest/Build/";

        const config = {
            dataUrl: buildBase + "BeausHorrorGame.data.unityweb",
            frameworkUrl: buildBase + "BeausHorrorGame.framework.js.unityweb",
            codeUrl: buildBase + "BeausHorrorGame.wasm.unityweb",
            streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/BeauTheBean/BeausBackRooms@latest/StreamingAssets",
            companyName: "BeauTheBean",
            productName: "BeausHorrorGame",
            productVersion: "0.1"
        };

        const loaderUrl = buildBase + "BeausHorrorGame.loader.js";

        const script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            createUnityInstance(canvas, config).catch((e) => {
                console.error(e);
                alert("Game failed to load");
            });
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
