<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>BeausHorrorGame</title>

    <style>
        body { margin: 0; background: black; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>

<body>
<canvas id="unity-canvas"></canvas>

<script>
const canvas = document.getElementById("unity-canvas");

const base = "https://cdn.jsdelivr.net/gh/BeauTheBean/BeausBackRooms@main/Build/";

const config = {
    dataUrl: base + "BeausHorrorGame.data.unityweb",
    frameworkUrl: base + "BeausHorrorGame.framework.js.unityweb",
    codeUrl: base + "BeausHorrorGame.wasm.unityweb",
    streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/BeauTheBean/BeausBackRooms@main/StreamingAssets",
    companyName: "BeauTheBean",
    productName: "BeausHorrorGame",
    productVersion: "0.1"
};

const loaderUrl = base + "BeausHorrorGame.loader.js";

function loadScript(url, cb) {
    const s = document.createElement("script");
    s.src = url;
    s.onload = cb;
    document.body.appendChild(s);
}

loadScript(loaderUrl, () => {
    createUnityInstance(canvas, config)
    .catch(err => {
        console.error(err);
        alert("Load failed: " + err);
    });
});
</script>

</body>
</html>
